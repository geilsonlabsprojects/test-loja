<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estoque & Vitrine Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-blur {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .toast {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-40 px-4 py-4 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-2xl shadow-lg shadow-indigo-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>
                </div>
                <div>
                    <h1 class="font-extrabold text-slate-800 text-lg leading-none mb-1">StockMaster</h1>
                    <p id="view-indicator" class="text-[10px] uppercase tracking-[0.1em] text-slate-400 font-bold">Vitrine de Produtos</p>
                </div>
            </div>
            
            <button id="admin-toggle-btn" onclick="toggleAdminMode()" class="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 px-5 py-2.5 rounded-2xl text-sm font-bold text-slate-700 transition active:scale-95">
                <svg id="admin-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span>Gestão</span>
            </button>
        </div>
    </header>

    <!-- Search & Filter Bar -->
    <section class="p-4 bg-white border-b sticky top-[77px] z-30">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-3">
            <div class="relative flex-1">
                <input type="text" id="search-input" oninput="renderApp()" placeholder="Pesquisar no catálogo..." class="w-full pl-11 pr-4 py-3.5 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-medium">
                <svg class="absolute left-4 top-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
            <select id="category-filter" onchange="renderApp()" class="px-5 py-3.5 bg-slate-100 rounded-2xl outline-none text-sm font-bold text-slate-600 cursor-pointer appearance-none">
                <option value="all">Todas as Categorias</option>
                <option value="Eletrónicos">Eletrónicos</option>
                <option value="Acessórios">Acessórios</option>
                <option value="Vestuário">Vestuário</option>
                <option value="Outros">Outros</option>
            </select>
        </div>
    </section>

    <!-- Main Content -->
    <main id="app-container" class="max-w-6xl mx-auto p-4 md:p-6 min-h-[60vh]">
        <!-- Conteúdo dinâmico aqui -->
    </main>

    <!-- Admin Navigation (Bottom) -->
    <nav id="admin-nav" class="fixed bottom-0 left-0 right-0 bg-white/80 modal-blur border-t p-3 flex justify-around items-center hidden z-50 shadow-2xl">
        <button onclick="switchAdminTab('stock')" class="flex flex-col items-center p-2 transition-colors duration-200" id="tab-stock">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9l-3-3H2v16h20V7Z"/></svg>
            <span class="text-[10px] font-extrabold mt-1">ESTOQUE</span>
        </button>
        <button onclick="openProductModal()" class="bg-indigo-600 text-white p-4 rounded-3xl -mt-14 shadow-xl shadow-indigo-200 active:scale-90 hover:bg-indigo-700 transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button onclick="switchAdminTab('history')" class="flex flex-col items-center p-2 transition-colors duration-200" id="tab-history">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            <span class="text-[10px] font-extrabold mt-1">VENDAS</span>
        </button>
    </nav>

    <!-- Modals -->
    <!-- Password -->
    <div id="password-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-slate-900/60 modal-blur">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <div class="bg-indigo-50 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Painel Admin</h2>
            <p class="text-slate-500 text-sm font-medium mb-8">Insira o código de acesso para gerir o seu stock.</p>
            <input type="password" id="admin-pass-input" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-6 text-center text-3xl tracking-[0.5em] focus:border-indigo-500 outline-none transition-all" placeholder="••••">
            <div class="flex gap-3">
                <button onclick="closePasswordModal()" class="flex-1 py-4 text-slate-400 font-bold text-sm">Voltar</button>
                <button onclick="verifyPassword()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold text-sm shadow-lg shadow-indigo-100 active:scale-95">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Product Form -->
    <div id="product-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/60 modal-blur overflow-y-auto">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl p-8 my-auto relative">
            <h2 id="modal-title" class="text-2xl font-black text-slate-800 mb-8">Novo Produto</h2>
            
            <form id="product-form" class="space-y-6">
                <input type="hidden" id="edit-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="text-[11px] font-black uppercase text-slate-400 tracking-wider mb-2 block ml-1">Nome do Produto</label>
                        <input type="text" id="p-name" required class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 font-medium">
                    </div>
                    
                    <div>
                        <label class="text-[11px] font-black uppercase text-slate-400 tracking-wider mb-2 block ml-1">Categoria</label>
                        <select id="p-cat" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 font-bold text-slate-600">
                            <option>Eletrónicos</option>
                            <option>Acessórios</option>
                            <option>Vestuário</option>
                            <option>Outros</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[11px] font-black uppercase text-slate-400 tracking-wider mb-2 block ml-1">Estoque Inicial</label>
                        <input type="number" id="p-stock" required min="0" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-indigo-500 font-bold">
                    </div>
                </div>

                <!-- Custo Auto -->
                <div class="bg-slate-50 p-6 rounded-[2rem] border-2 border-slate-100 space-y-5">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-1 h-4 bg-indigo-500 rounded-full"></div>
                        <p class="text-[11px] font-black uppercase text-indigo-500 tracking-wider">Calculadora de Custo Unitário</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Preço Total Pago</label>
                            <input type="number" step="0.01" id="calc-total" oninput="calcUnit()" class="w-full p-3 bg-white rounded-xl outline-none border border-slate-200" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Unidades no Lote</label>
                            <input type="number" id="calc-qty" oninput="calcUnit()" class="w-full p-3 bg-white rounded-xl outline-none border border-slate-200" placeholder="1">
                        </div>
                    </div>
                    <div class="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-200">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Custo p/ Unidade</p>
                            <p id="display-cost" class="text-xl font-black text-slate-800">0.00 €</p>
                        </div>
                        <div class="text-right">
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Custo Extra Unitário</label>
                            <input type="number" step="0.01" id="calc-extra" oninput="calcUnit()" class="w-full p-2 bg-slate-50 rounded-lg outline-none border border-slate-200 text-right w-24" value="0">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-[11px] font-black uppercase text-slate-400 tracking-wider mb-2 block ml-1">Preço de Venda</label>
                        <div class="relative">
                            <input type="number" step="0.01" id="p-price" required oninput="calcUnit()" class="w-full p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl outline-none focus:border-indigo-500 font-black text-indigo-600 text-xl">
                        </div>
                    </div>
                    <div class="flex flex-col justify-center items-end bg-green-50 p-4 rounded-2xl border-2 border-green-100">
                        <span class="text-[10px] font-black uppercase text-green-500 tracking-tighter">Lucro por Venda</span>
                        <span id="display-profit" class="text-xl font-black text-green-600">0.00 €</span>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-black uppercase text-slate-400 tracking-wider mb-2 block ml-1">URL da Imagem</label>
                    <input type="text" id="p-img" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none" placeholder="https://exemplo.pt/imagem.jpg">
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeProductModal()" class="flex-1 py-5 text-slate-400 font-bold">Cancelar</button>
                    <button type="submit" class="flex-[2] bg-indigo-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl shadow-indigo-100 active:scale-95 transition">Guardar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[150] space-y-2 w-[90%] max-w-xs"></div>

    <script>
        // --- CONFIGURAÇÃO E DADOS LOCAIS ---
        const STORAGE_KEY_PRODUCTS = 'stockmaster_products';
        const STORAGE_KEY_SALES = 'stockmaster_sales';
        const ADMIN_PASSWORD = "1234"; // Altere aqui a sua senha

        let products = JSON.parse(localStorage.getItem(STORAGE_KEY_PRODUCTS)) || [];
        let sales = JSON.parse(localStorage.getItem(STORAGE_KEY_SALES)) || [];
        let isAdmin = false;
        let adminTab = 'stock';

        // --- INICIALIZAÇÃO ---
        window.onload = () => {
            renderApp();
        };

        // Salvar dados
        const persist = () => {
            localStorage.setItem(STORAGE_KEY_PRODUCTS, JSON.stringify(products));
            localStorage.setItem(STORAGE_KEY_SALES, JSON.stringify(sales));
        };

        // --- GESTÃO DE UI ---
        window.toggleAdminMode = () => {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('admin-nav').classList.add('hidden');
                document.getElementById('view-indicator').innerText = 'Vitrine de Produtos';
                document.getElementById('admin-toggle-btn').querySelector('span').innerText = 'Gestão';
                document.getElementById('admin-toggle-btn').classList.replace('bg-indigo-600', 'bg-slate-100');
                document.getElementById('admin-toggle-btn').classList.replace('text-white', 'text-slate-700');
                renderApp();
            } else {
                document.getElementById('password-modal').classList.remove('hidden');
                document.getElementById('password-modal').classList.add('flex');
            }
        };

        window.closePasswordModal = () => {
            document.getElementById('password-modal').classList.add('hidden');
            document.getElementById('password-modal').classList.remove('flex');
            document.getElementById('admin-pass-input').value = '';
        };

        window.verifyPassword = () => {
            if (document.getElementById('admin-pass-input').value === ADMIN_PASSWORD) {
                isAdmin = true;
                closePasswordModal();
                document.getElementById('admin-nav').classList.remove('hidden');
                document.getElementById('view-indicator').innerText = 'Painel Administrativo';
                document.getElementById('admin-toggle-btn').querySelector('span').innerText = 'Sair Admin';
                document.getElementById('admin-toggle-btn').classList.replace('bg-slate-100', 'bg-indigo-600');
                document.getElementById('admin-toggle-btn').classList.add('text-white');
                showToast("Acesso autorizado", "success");
                renderApp();
            } else {
                showToast("Senha incorreta", "error");
            }
        };

        window.switchAdminTab = (tab) => {
            adminTab = tab;
            const activeClass = 'text-indigo-600';
            const inactiveClass = 'text-slate-400';
            
            document.getElementById('tab-stock').classList.toggle(activeClass, tab === 'stock');
            document.getElementById('tab-stock').classList.toggle(inactiveClass, tab !== 'stock');
            document.getElementById('tab-history').classList.toggle(activeClass, tab === 'history');
            document.getElementById('tab-history').classList.toggle(inactiveClass, tab !== 'history');
            
            renderApp();
        };

        // --- RENDERIZAÇÃO ---
        window.renderApp = () => {
            const container = document.getElementById('app-container');
            const search = document.getElementById('search-input').value.toLowerCase();
            const cat = document.getElementById('category-filter').value;

            const filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search);
                const matchCat = cat === 'all' || p.category === cat;
                return matchSearch && matchCat;
            });

            if (!isAdmin) {
                renderVitrine(container, filtered);
            } else {
                adminTab === 'stock' ? renderStock(container, filtered) : renderSales(container);
            }
        };

        function renderVitrine(el, data) {
            if (data.length === 0) {
                el.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-slate-400">
                    <svg class="mb-4 opacity-20" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 12h6"/><path d="M12 9v6"/></svg>
                    <p class="font-bold">Nenhum produto encontrado.</p>
                </div>`;
                return;
            }

            el.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                ${data.map(p => `
                    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 product-card flex flex-col">
                        <div class="aspect-square bg-slate-50 relative">
                            <img src="${p.image || 'https://via.placeholder.com/400x400?text=Sem+Imagem'}" class="w-full h-full object-cover">
                            ${p.stock <= 0 ? '<div class="absolute inset-0 bg-white/70 backdrop-blur-[2px] flex items-center justify-center font-black text-xs text-red-500 uppercase tracking-tighter">Sem Stock</div>' : ''}
                        </div>
                        <div class="p-4 flex-1 flex flex-col">
                            <span class="text-[9px] font-black text-indigo-500 uppercase tracking-widest mb-1">${p.category}</span>
                            <h3 class="font-bold text-sm text-slate-800 line-clamp-2 leading-tight flex-1">${p.name}</h3>
                            <div class="mt-4 flex items-center justify-between">
                                <span class="font-black text-lg text-slate-900">${p.salePrice.toFixed(2)}€</span>
                                <div class="w-2 h-2 rounded-full ${p.stock > 0 ? 'bg-green-400' : 'bg-red-400'}"></div>
                            </div>
                        </div>
                    </div>
                `).join('')}
            </div>`;
        }

        function renderStock(el, data) {
            el.innerHTML = `
                <div class="flex justify-between items-end mb-8">
                    <h2 class="text-2xl font-black text-slate-800">Inventário</h2>
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">${data.length} Itens</span>
                </div>
                <div class="space-y-3">
                    ${data.map(p => `
                        <div class="bg-white p-4 rounded-[1.5rem] flex items-center gap-4 border border-slate-100 shadow-sm">
                            <img src="${p.image || 'https://via.placeholder.com/100'}" class="w-16 h-16 rounded-2xl object-cover bg-slate-50 border">
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-slate-800 truncate text-sm">${p.name}</h3>
                                <div class="flex items-center gap-3 mt-1.5">
                                    <div class="px-2 py-0.5 rounded-md ${p.stock <= 5 ? 'bg-red-50 text-red-500' : 'bg-slate-100 text-slate-500'} text-[10px] font-black">
                                        STOCK: ${p.stock}
                                    </div>
                                    <span class="text-xs font-black text-indigo-600">${p.salePrice.toFixed(2)}€</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="quickSale('${p.id}')" class="bg-green-500 text-white p-3 rounded-xl active:scale-90 transition shadow-lg shadow-green-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2v10"/><path d="m16 8-4 4-4-4"/><path d="M12 22a7 7 0 1 0 0-14 7 7 0 0 0 0 14Z"/></svg>
                                </button>
                                <button onclick="editProduct('${p.id}')" class="bg-slate-100 text-slate-500 p-3 rounded-xl active:scale-90 transition">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                                </button>
                                <button onclick="deleteProduct('${p.id}')" class="bg-red-50 text-red-400 p-3 rounded-xl active:scale-90 transition">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderSales(el) {
            const totalFaturado = sales.reduce((acc, s) => acc + s.amount, 0);
            const totalLucro = sales.reduce((acc, s) => acc + s.profit, 0);

            el.innerHTML = `
                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="bg-indigo-600 p-6 rounded-[2rem] shadow-xl shadow-indigo-100">
                        <p class="text-[10px] font-black text-indigo-200 uppercase tracking-widest mb-1">Faturamento</p>
                        <p class="text-2xl font-black text-white">${totalFaturado.toFixed(2)}€</p>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border-2 border-slate-100">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Lucro Real</p>
                        <p class="text-2xl font-black text-green-600">${totalLucro.toFixed(2)}€</p>
                    </div>
                </div>
                
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black text-slate-800">Últimas Vendas</h2>
                    <button onclick="clearHistory()" class="text-[10px] font-black text-red-400 uppercase tracking-widest">Limpar Tudo</button>
                </div>

                <div class="space-y-3">
                    ${sales.length === 0 ? '<p class="text-center py-10 text-slate-400 font-bold">Nenhuma venda registada.</p>' : 
                    sales.sort((a,b) => b.date - a.date).map(s => `
                        <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm">
                            <div class="min-w-0">
                                <p class="font-bold text-slate-800 truncate text-sm">${s.pName}</p>
                                <p class="text-[10px] text-slate-400 font-medium">${new Date(s.date).toLocaleString('pt-PT')}</p>
                            </div>
                            <div class="text-right flex-shrink-0 ml-4">
                                <p class="font-black text-green-600 text-sm">+${s.amount.toFixed(2)}€</p>
                                <p class="text-[9px] font-black text-slate-300">LUCRO: ${s.profit.toFixed(2)}€</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // --- LÓGICA DE NEGÓCIO ---
        window.calcUnit = () => {
            const total = parseFloat(document.getElementById('calc-total').value) || 0;
            const qty = parseInt(document.getElementById('calc-qty').value) || 1;
            const extra = parseFloat(document.getElementById('calc-extra').value) || 0;
            const sale = parseFloat(document.getElementById('p-price').value) || 0;

            const unitCost = (total / qty) + extra;
            const profit = sale - unitCost;

            document.getElementById('display-cost').innerText = `${unitCost.toFixed(2)} €`;
            document.getElementById('display-profit').innerText = `${profit.toFixed(2)} €`;
            return { unitCost, profit };
        };

        window.openProductModal = () => {
            document.getElementById('product-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-title').innerText = 'Novo Produto';
            document.getElementById('product-modal').classList.remove('hidden');
            document.getElementById('product-modal').classList.add('flex');
            calcUnit();
        };

        window.closeProductModal = () => {
            document.getElementById('product-modal').classList.add('hidden');
            document.getElementById('product-modal').classList.remove('flex');
        };

        document.getElementById('product-form').onsubmit = (e) => {
            e.preventDefault();
            const { unitCost } = calcUnit();
            const id = document.getElementById('edit-id').value;
            
            const productData = {
                id: id || Date.now().toString(),
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                stock: parseInt(document.getElementById('p-stock').value),
                salePrice: parseFloat(document.getElementById('p-price').value),
                unitCost: unitCost,
                image: document.getElementById('p-img').value,
                createdAt: id ? products.find(p => p.id === id).createdAt : Date.now()
            };

            if (id) {
                products = products.map(p => p.id === id ? productData : p);
                showToast("Produto atualizado", "info");
            } else {
                products.push(productData);
                showToast("Produto criado", "success");
            }

            persist();
            closeProductModal();
            renderApp();
        };

        window.editProduct = (id) => {
            const p = products.find(x => x.id === id);
            if (!p) return;
            
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-price').value = p.salePrice;
            document.getElementById('p-img').value = p.image || '';
            document.getElementById('calc-total').value = p.unitCost;
            document.getElementById('calc-qty').value = 1;
            document.getElementById('calc-extra').value = 0;
            
            document.getElementById('modal-title').innerText = 'Editar Produto';
            document.getElementById('product-modal').classList.remove('hidden');
            document.getElementById('product-modal').classList.add('flex');
            calcUnit();
        };

        window.deleteProduct = (id) => {
            if (confirm("Tens a certeza que queres apagar este produto?")) {
                products = products.filter(p => p.id !== id);
                persist();
                renderApp();
                showToast("Produto apagado", "error");
            }
        };

        window.quickSale = (id) => {
            const index = products.findIndex(p => p.id === id);
            if (index === -1) return;
            
            const p = products[index];
            if (p.stock <= 0) {
                showToast("Sem stock disponível!", "error");
                return;
            }

            // Baixar stock
            products[index].stock -= 1;
            
            // Registar venda
            sales.push({
                id: Date.now().toString(),
                pId: id,
                pName: p.name,
                amount: p.salePrice,
                profit: p.salePrice - (p.unitCost || 0),
                date: Date.now()
            });

            persist();
            renderApp();
            showToast(`Venda: ${p.name}`, "success");
        };

        window.clearHistory = () => {
            if (confirm("Limpar todo o histórico de vendas? Esta ação é irreversível.")) {
                sales = [];
                persist();
                renderApp();
                showToast("Histórico limpo", "info");
            }
        };

        // --- UTILITÁRIOS ---
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-500',
                info: 'bg-slate-800'
            };

            toast.className = `${colors[type]} text-white text-[11px] font-black uppercase tracking-widest px-6 py-4 rounded-2xl shadow-2xl toast flex items-center justify-center text-center`;
            toast.innerText = msg;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

    </script>
</body>
</html>
