<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estoque & Vitrine Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.1);
        }

        .modal-blur {
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Toast Animations */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .toast-exit { animation: slideOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    </style>
</head>
<body class="pb-24 text-slate-800">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-4 z-[200] flex flex-col gap-2 pointer-events-none w-72 max-w-[calc(100vw-32px)]"></div>

    <!-- Header / Navigation -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3 shadow-sm shadow-slate-100/50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-600 p-2.5 rounded-2xl shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/><path d="M12 3v6"/></svg>
                </div>
                <div>
                    <h1 class="font-extrabold text-lg leading-tight tracking-tight text-slate-900">Minha Loja</h1>
                    <p id="view-indicator" class="text-[10px] uppercase tracking-widest text-blue-500 font-bold">Vitrine Pública</p>
                </div>
            </div>
            
            <button id="admin-toggle-btn" onclick="toggleAdminMode()" class="flex items-center gap-2 bg-slate-50 hover:bg-slate-100 border border-slate-200 px-4 py-2.5 rounded-full text-sm font-semibold text-slate-700 transition active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span class="hidden sm:inline">Painel ADM</span>
            </button>
        </div>
    </header>

    <!-- Search & Filters -->
    <section class="px-4 py-3 bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-[73px] z-30">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-3">
            <div class="relative flex-1">
                <input type="text" id="search-input" oninput="renderApp()" placeholder="Buscar produtos..." class="w-full pl-11 pr-4 py-3.5 bg-slate-100/50 hover:bg-slate-100 border border-transparent focus:border-blue-500 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 text-sm font-medium transition-all placeholder:text-slate-400">
                <svg class="absolute left-4 top-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </div>
            <select id="category-filter" onchange="renderApp()" class="px-4 py-3.5 bg-slate-100/50 hover:bg-slate-100 border border-transparent focus:border-blue-500 rounded-2xl outline-none text-sm font-semibold text-slate-700 transition-all cursor-pointer appearance-none md:w-48">
                <option value="all">Todas Categorias</option>
                <option value="Eletrônicos">Eletrônicos</option>
                <option value="Acessórios">Acessórios</option>
                <option value="Casa">Casa</option>
                <option value="Vestuário">Vestuário</option>
                <option value="Outros">Outros</option>
            </select>
        </div>
    </section>

    <!-- Main Content -->
    <main id="app-container" class="max-w-6xl mx-auto p-4 md:p-6 min-h-[60vh]">
        <div class="flex justify-center items-center h-48">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>
    </main>

    <!-- Admin Bottom Nav -->
    <nav id="admin-nav" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-slate-200 p-2 flex justify-around items-center hidden z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] pb-safe">
        <button onclick="switchAdminTab('stock')" class="flex flex-col items-center p-2 w-20 text-blue-600 transition-colors" id="tab-stock">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9l-3-3H2v16h20V7Z"/></svg>
            <span class="text-[10px] font-bold mt-1 tracking-wide">Estoque</span>
        </button>
        <div class="relative -top-6">
            <button onclick="openProductModal()" class="bg-gradient-to-tr from-blue-600 to-indigo-600 text-white p-4 rounded-2xl shadow-xl shadow-blue-600/30 hover:shadow-blue-600/50 hover:-translate-y-1 active:scale-90 transition-all duration-200 border-4 border-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>
        <button onclick="switchAdminTab('history')" class="flex flex-col items-center p-2 w-20 text-slate-400 hover:text-slate-600 transition-colors" id="tab-history">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            <span class="text-[10px] font-bold mt-1 tracking-wide">Vendas</span>
        </button>
    </nav>

    <!-- Password Modal -->
    <div id="password-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 modal-blur bg-slate-900/40 opacity-0 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center transform scale-95 transition-transform duration-300 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-indigo-500"></div>
            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-800 mb-1">Acesso Restrito</h2>
            <p class="text-slate-500 text-sm mb-6 font-medium">Área exclusiva para gestão</p>
            
            <input type="password" id="admin-pass-input" onkeyup="if(event.key === 'Enter') verifyPassword()" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-6 text-center text-3xl tracking-[0.5em] font-mono focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all placeholder:text-slate-300" placeholder="••••">
            
            <div class="flex gap-3">
                <button onclick="closePasswordModal()" class="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-bold text-sm transition-colors">Cancelar</button>
                <button onclick="verifyPassword()" class="flex-1 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-sm shadow-lg shadow-blue-200 transition-all active:scale-95">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Product Form Modal -->
    <div id="product-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 modal-blur bg-slate-900/50 overflow-y-auto opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-xl rounded-[2rem] shadow-2xl p-6 md:p-8 my-auto transform scale-95 transition-transform duration-300">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-extrabold text-slate-800">Novo Produto</h2>
                <button onclick="closeProductModal()" class="p-2 bg-slate-50 hover:bg-slate-100 rounded-full text-slate-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>

            <form id="product-form" class="space-y-5">
                <input type="hidden" id="edit-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="text-[11px] font-extrabold uppercase tracking-wide text-slate-500 ml-1 mb-1 block">Nome do Produto</label>
                        <input type="text" id="p-name" required placeholder="Ex: Fone Bluetooth Pro" class="w-full p-3.5 bg-slate-50 border border-slate-200 hover:border-slate-300 rounded-xl outline-none focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-slate-800">
                    </div>
                    
                    <div>
                        <label class="text-[11px] font-extrabold uppercase tracking-wide text-slate-500 ml-1 mb-1 block">Categoria</label>
                        <select id="p-cat" class="w-full p-3.5 bg-slate-50 border border-slate-200 hover:border-slate-300 rounded-xl outline-none focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-slate-800 appearance-none cursor-pointer">
                            <option>Eletrônicos</option>
                            <option>Acessórios</option>
                            <option>Casa</option>
                            <option>Vestuário</option>
                            <option>Outros</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[11px] font-extrabold uppercase tracking-wide text-slate-500 ml-1 mb-1 block">Qtd. Inicial</label>
                        <input type="number" id="p-stock" required min="0" placeholder="0" class="w-full p-3.5 bg-slate-50 border border-slate-200 hover:border-slate-300 rounded-xl outline-none focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium text-slate-800">
                    </div>
                </div>

                <div class="bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 p-5 rounded-2xl space-y-4">
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="text-blue-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="18" y2="18"/></svg>
                        <p class="text-xs font-extrabold text-blue-700 uppercase tracking-wide">Cálculo de Custo</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold uppercase text-blue-500/80 mb-1 block">Preço do Lote (R$)</label>
                            <input type="number" step="0.01" min="0" id="calc-total" oninput="calcUnit()" class="w-full p-2.5 bg-white border border-blue-100 focus:border-blue-400 rounded-lg outline-none font-medium text-slate-700" placeholder="0.00">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold uppercase text-blue-500/80 mb-1 block">Itens no Lote</label>
                            <input type="number" id="calc-qty" min="1" oninput="calcUnit()" class="w-full p-2.5 bg-white border border-blue-100 focus:border-blue-400 rounded-lg outline-none font-medium text-slate-700" placeholder="1">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 items-end">
                        <div>
                            <label class="text-[10px] font-bold uppercase text-blue-500/80 mb-1 block">Frete/Extra por Un.</label>
                            <input type="number" step="0.01" min="0" id="calc-extra" oninput="calcUnit()" class="w-full p-2.5 bg-white border border-blue-100 focus:border-blue-400 rounded-lg outline-none font-medium text-slate-700" placeholder="0.00">
                        </div>
                        <div class="bg-white px-3 py-2.5 rounded-lg border border-blue-100 flex flex-col justify-center">
                            <span class="text-[10px] font-bold uppercase text-slate-400">Custo Final/Un:</span>
                            <span id="display-cost" class="font-extrabold text-slate-800 text-sm">R$ 0,00</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5 bg-green-50/50 p-4 rounded-2xl border border-green-100">
                    <div>
                        <label class="text-[11px] font-extrabold uppercase tracking-wide text-green-700 ml-1 mb-1 block">Preço de Venda</label>
                        <input type="number" step="0.01" min="0" id="p-price" required oninput="calcUnit()" placeholder="0.00" class="w-full p-3.5 bg-white border border-green-200 focus:border-green-500 rounded-xl outline-none focus:ring-4 focus:ring-green-500/10 font-bold text-green-700 text-lg">
                    </div>
                    <div class="flex flex-col justify-center items-end bg-white p-3 rounded-xl border border-green-100">
                        <span class="text-[10px] font-bold uppercase tracking-wide text-slate-400">Lucro Estimado</span>
                        <span id="display-profit" class="font-black text-green-600 text-lg">R$ 0,00</span>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-extrabold uppercase tracking-wide text-slate-500 ml-1 mb-1 block">URL da Imagem</label>
                    <div class="flex gap-3">
                        <input type="url" id="p-img" oninput="updateImagePreview()" class="flex-1 p-3.5 bg-slate-50 border border-slate-200 hover:border-slate-300 rounded-xl outline-none focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm" placeholder="https://...">
                        <div class="w-12 h-12 shrink-0 rounded-xl border border-slate-200 bg-slate-50 overflow-hidden flex items-center justify-center">
                            <img id="img-preview" src="" class="w-full h-full object-cover hidden" onerror="this.classList.add('hidden'); document.getElementById('img-icon').classList.remove('hidden')">
                            <svg id="img-icon" class="text-slate-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                        </div>
                    </div>
                </div>

                <div class="pt-2 flex gap-3">
                    <button type="button" id="btn-delete-product" onclick="confirmDeleteProduct()" class="hidden py-4 px-5 bg-red-50 text-red-600 rounded-xl font-bold hover:bg-red-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                    </button>
                    <button type="submit" id="submit-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-600/20 transition-all active:scale-[0.98] text-center flex justify-center items-center gap-2">
                        <span>Salvar Produto</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Global Variables
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'meu-estoque-v1';

        // Global State
        let products = [];
        let sales = [];
        let isAdmin = false;
        let adminTab = 'stock';
        let currentUser = null;

        const ADMIN_PASSWORD = "1234";

        /**
         * MANDATORY RULE 3: Auth Before Queries
         */
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showToast("Erro de autenticação.", "error");
            }
        };

        // Listen for auth state changes to start data fetching
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                startRealtimeListeners();
            } else {
                // Clear UI if logged out
                document.getElementById('app-container').innerHTML = `<p class="text-center text-slate-500 py-10">Aguardando login...</p>`;
            }
        });

        function startRealtimeListeners() {
            if (!currentUser) return;

            /**
             * MANDATORY RULE 1: Strict Paths
             */
            const productsCol = collection(db, 'artifacts', appId, 'public', 'data', 'products');
            const salesCol = collection(db, 'artifacts', appId, 'public', 'data', 'sales');

            // Listen to Products
            onSnapshot(productsCol, (snap) => {
                products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderApp();
            }, (error) => {
                console.error("Firestore error (products):", error);
                showToast("Erro ao sincronizar estoque.", "error");
            });

            // Listen to Sales
            onSnapshot(salesCol, (snap) => {
                sales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (isAdmin) renderApp();
            }, (error) => {
                console.error("Firestore error (sales):", error);
            });
        }

        // --- UI Utilities ---

        window.formatMoney = (value) => {
            if(isNaN(value) || value === null) value = 0;
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        };

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                info: 'bg-slate-800'
            };
            
            const icons = {
                success: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
                error: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`,
                info: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`
            };

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-xl text-white font-medium text-sm shadow-xl pointer-events-auto toast-enter ${colors[type]}`;
            toast.innerHTML = `${icons[type]} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // --- Modals and Toggles ---

        window.toggleAdminMode = () => {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('admin-nav').classList.add('hidden');
                const btn = document.getElementById('admin-toggle-btn');
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> <span class="hidden sm:inline">Painel ADM</span>`;
                btn.classList.remove('bg-red-50', 'text-red-600', 'hover:bg-red-100');
                document.getElementById('view-indicator').innerText = 'Vitrine Pública';
                document.getElementById('view-indicator').className = 'text-[10px] uppercase tracking-widest text-blue-500 font-bold';
                showToast("Modo Público ativado", "info");
                renderApp();
            } else {
                const modal = document.getElementById('password-modal');
                const content = modal.querySelector('div');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    content.classList.remove('scale-95');
                    document.getElementById('admin-pass-input').focus();
                }, 10);
            }
        };

        window.closePasswordModal = () => {
            const modal = document.getElementById('password-modal');
            const content = modal.querySelector('div');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.getElementById('admin-pass-input').value = '';
            }, 300);
        };

        window.verifyPassword = () => {
            const pass = document.getElementById('admin-pass-input').value;
            if (pass === ADMIN_PASSWORD) {
                isAdmin = true;
                closePasswordModal();
                document.getElementById('admin-nav').classList.remove('hidden');
                
                const btn = document.getElementById('admin-toggle-btn');
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> <span class="hidden sm:inline">Sair ADM</span>`;
                btn.classList.add('bg-red-50', 'text-red-600', 'hover:bg-red-100');
                
                document.getElementById('view-indicator').innerText = 'Painel Administrativo';
                document.getElementById('view-indicator').className = 'text-[10px] uppercase tracking-widest text-slate-500 font-bold';
                
                showToast("Acesso liberado!", "success");
                renderApp();
            } else {
                showToast("Senha incorreta!", "error");
                document.getElementById('admin-pass-input').value = '';
                document.getElementById('admin-pass-input').focus();
            }
        };

        window.switchAdminTab = (tab) => {
            adminTab = tab;
            document.getElementById('tab-stock').classList.toggle('text-blue-600', tab === 'stock');
            document.getElementById('tab-stock').classList.toggle('text-slate-400', tab !== 'stock');
            document.getElementById('tab-history').classList.toggle('text-blue-600', tab === 'history');
            document.getElementById('tab-history').classList.toggle('text-slate-400', tab !== 'history');
            renderApp();
        };

        // --- Main Rendering ---

        window.renderApp = () => {
            const container = document.getElementById('app-container');
            if (!container) return;

            const search = document.getElementById('search-input').value.toLowerCase();
            const cat = document.getElementById('category-filter').value;

            // Sort logic: In stock first, then alphabetical
            let sortedProducts = [...products].sort((a, b) => {
                if(a.stock > 0 && b.stock <= 0) return -1;
                if(a.stock <= 0 && b.stock > 0) return 1;
                return (a.name || "").localeCompare(b.name || "");
            });

            const filtered = sortedProducts.filter(p => {
                const mSearch = (p.name || "").toLowerCase().includes(search);
                const mCat = cat === 'all' || p.category === cat;
                return mSearch && mCat;
            });

            if (!isAdmin) {
                renderVitrine(container, filtered);
            } else {
                if (adminTab === 'stock') {
                    renderStock(container, filtered);
                } else {
                    renderSalesHistory(container);
                }
            }
        };

        function getEmptyState(title, desc, iconSvg) {
            return `
                <div class="flex flex-col items-center justify-center py-16 text-center animate-fade-in">
                    <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center text-slate-300 mb-4">
                        ${iconSvg}
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-1">${title}</h3>
                    <p class="text-sm text-slate-500 max-w-xs">${desc}</p>
                </div>
            `;
        }

        function renderVitrine(el, data) {
            if(data.length === 0) {
                el.innerHTML = getEmptyState(
                    "Nenhum produto", 
                    "Não encontramos nada com os filtros atuais.",
                    `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-6-6m6 6v-4.8m0 4.8h-4.8M3 16.2V21m0 0h4.8M3 21l6-6M21 7.8V3m0 0h-4.8M21 3l-6 6M3 7.8V3m0 0h4.8M3 3l6 6"/></svg>`
                );
                return;
            }

            el.innerHTML = `
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                    ${data.map(p => `
                        <div class="bg-white rounded-[1.5rem] overflow-hidden shadow-sm hover:shadow-xl product-card border border-slate-100 flex flex-col group ${p.stock <= 0 ? 'opacity-70 grayscale-[0.3]' : ''}">
                            <div class="aspect-square bg-slate-50 relative overflow-hidden flex items-center justify-center">
                                <img src="${p.image || ''}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" 
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                                <div class="absolute inset-0 items-center justify-center bg-slate-100 text-slate-300 ${p.image ? 'hidden' : 'flex'}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                                </div>
                                ${p.stock <= 0 ? 
                                    '<div class="absolute inset-0 bg-white/70 backdrop-blur-[2px] flex items-center justify-center"><span class="bg-slate-800 text-white font-black text-[10px] px-3 py-1.5 rounded-full tracking-widest uppercase">Esgotado</span></div>' : 
                                    (p.stock <= 3 ? '<div class="absolute top-3 right-3 bg-orange-500 text-white font-bold text-[10px] px-2.5 py-1 rounded-full shadow-lg shadow-orange-500/30">Restam ' + p.stock + '</div>' : '')
                                }
                            </div>
                            <div class="p-4 md:p-5 flex-1 flex flex-col">
                                <span class="text-[10px] font-extrabold text-blue-500 uppercase tracking-wider mb-1 block">${p.category}</span>
                                <h3 class="font-bold text-sm md:text-base text-slate-800 line-clamp-2 leading-tight">${p.name}</h3>
                                <div class="mt-auto pt-4 flex items-center justify-between">
                                    <span class="font-black text-lg text-slate-900">${formatMoney(p.salePrice)}</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderStock(el, data) {
            el.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-xl md:text-2xl font-extrabold text-slate-800">Gestão de Estoque</h2>
                        <p class="text-sm text-slate-500 font-medium">Controle rápido de produtos</p>
                    </div>
                    <span class="bg-blue-50 text-blue-600 border border-blue-100 text-xs px-3 py-1.5 rounded-full font-bold shadow-sm">${data.length} Itens</span>
                </div>
                
                ${data.length === 0 ? getEmptyState("Estoque Vazio", "Clique no botão azul (+) para cadastrar um produto.", `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`) : 
                
                `<div class="space-y-3">
                    ${data.map(p => `
                        <div class="bg-white p-3 md:p-4 rounded-[1.5rem] flex items-center gap-4 shadow-sm border border-slate-100 hover:border-blue-100 hover:shadow-md transition-all">
                            <div class="w-14 h-14 md:w-16 md:h-16 shrink-0 rounded-xl bg-slate-50 border border-slate-100 overflow-hidden flex items-center justify-center">
                                <img src="${p.image || ''}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                                <svg class="text-slate-300 hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                            </div>
                            <div class="flex-1 min-w-0 py-1">
                                <h3 class="font-bold text-slate-800 truncate text-sm md:text-base">${p.name}</h3>
                                <div class="flex flex-wrap items-center gap-2 md:gap-4 mt-1">
                                    <span class="text-[11px] px-2 py-0.5 rounded-md font-bold ${p.stock <= 0 ? 'bg-red-50 text-red-600' : (p.stock <= 3 ? 'bg-orange-50 text-orange-600' : 'bg-slate-100 text-slate-600')}">
                                        Qtd: ${p.stock}
                                    </span>
                                    <span class="text-[11px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-md">
                                        ${formatMoney(p.salePrice)}
                                    </span>
                                </div>
                            </div>
                            <div class="flex gap-1.5 md:gap-2">
                                <button onclick="vendaRapida('${p.id}')" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white p-2.5 md:p-3 rounded-xl transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v10"/><path d="m16 8-4 4-4-4"/><path d="M12 22a7 7 0 1 0 0-14 7 7 0 0 0 0 14Z"/></svg>
                                </button>
                                <button onclick="editProduct('${p.id}')" class="bg-slate-50 text-slate-500 hover:bg-slate-200 p-2.5 md:p-3 rounded-xl transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>`
                }
            `;
        }

        function renderSalesHistory(el) {
            const totalLucro = sales.reduce((acc, s) => acc + (s.profit || 0), 0);
            const totalVenda = sales.reduce((acc, s) => acc + (s.amount || 0), 0);

            el.innerHTML = `
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-5 rounded-[1.5rem] shadow-lg shadow-slate-200 relative overflow-hidden">
                        <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-1">Faturamento Bruto</p>
                        <p class="text-xl md:text-2xl font-black text-white">${formatMoney(totalVenda)}</p>
                    </div>
                    <div class="bg-gradient-to-br from-green-500 to-emerald-600 p-5 rounded-[1.5rem] shadow-lg shadow-green-200 relative overflow-hidden">
                        <p class="text-[10px] font-extrabold text-green-100 uppercase tracking-wider mb-1">Lucro Líquido</p>
                        <p class="text-xl md:text-2xl font-black text-white">${formatMoney(totalLucro)}</p>
                    </div>
                </div>

                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl md:text-2xl font-extrabold text-slate-800">Histórico</h2>
                    ${sales.length > 0 ? `<button onclick="exportData()" class="text-xs font-bold text-blue-600 flex items-center gap-1 hover:underline"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> Exportar CSV</button>` : ''}
                </div>

                ${sales.length === 0 ? getEmptyState("Nenhuma venda", "Vendas realizadas aparecerão aqui.", `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>`) : 

                `<div class="space-y-3">
                    ${sales.sort((a,b) => b.date - a.date).map(s => `
                        <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                            <div>
                                <p class="font-bold text-sm text-slate-800">${s.pName}</p>
                                <p class="text-[11px] text-slate-400 font-medium mt-0.5">${new Date(s.date).toLocaleString('pt-BR')}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-green-600 text-sm md:text-base">${formatMoney(s.amount)}</p>
                                <p class="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-md mt-1 inline-block">Lucro: ${formatMoney(s.profit)}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>`
                }
            `;
        }

        // --- Business Logic ---

        window.calcUnit = () => {
            const total = parseFloat(document.getElementById('calc-total').value) || 0;
            const qty = parseInt(document.getElementById('calc-qty').value) || 1;
            const extra = parseFloat(document.getElementById('calc-extra').value) || 0;
            const sale = parseFloat(document.getElementById('p-price').value) || 0;

            const unit = (total / qty) + extra;
            const profit = sale - unit;

            document.getElementById('display-cost').innerText = formatMoney(unit);
            
            const dispProfit = document.getElementById('display-profit');
            dispProfit.innerText = formatMoney(profit);
            
            if(profit > 0) dispProfit.className = "font-black text-green-600 text-lg";
            else if(profit < 0) dispProfit.className = "font-black text-red-500 text-lg";
            else dispProfit.className = "font-black text-slate-400 text-lg";

            return { unit, profit };
        };

        window.updateImagePreview = () => {
            const url = document.getElementById('p-img').value;
            const img = document.getElementById('img-preview');
            const icon = document.getElementById('img-icon');
            
            if(url) {
                img.src = url;
                img.classList.remove('hidden');
                icon.classList.add('hidden');
            } else {
                img.classList.add('hidden');
                icon.classList.remove('hidden');
            }
        };

        window.openProductModal = () => {
            document.getElementById('product-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('modal-title').innerText = 'Novo Produto';
            document.getElementById('btn-delete-product').classList.add('hidden');
            document.getElementById('submit-btn').innerHTML = '<span>Adicionar Produto</span>';
            
            calcUnit();
            updateImagePreview();

            const modal = document.getElementById('product-modal');
            const content = modal.querySelector('div');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        };

        window.closeProductModal = () => {
            const modal = document.getElementById('product-modal');
            const content = modal.querySelector('div');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        };

        window.editProduct = (id) => {
            const p = products.find(x => x.id === id);
            if (!p) return;

            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-price').value = p.salePrice || '';
            document.getElementById('p-img').value = p.image || '';
            
            document.getElementById('calc-total').value = p.unitCost || 0;
            document.getElementById('calc-qty').value = 1;
            document.getElementById('calc-extra').value = 0;
            
            calcUnit();
            updateImagePreview();

            document.getElementById('modal-title').innerText = 'Editar Produto';
            document.getElementById('btn-delete-product').classList.remove('hidden');
            document.getElementById('submit-btn').innerHTML = '<span>Salvar Alterações</span>';

            const modal = document.getElementById('product-modal');
            const content = modal.querySelector('div');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        };

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> Salvando...`;
            btn.disabled = true;

            try {
                const { unit } = calcUnit();
                const id = document.getElementById('edit-id').value;
                const price = parseFloat(document.getElementById('p-price').value) || 0;
                
                if(price <= 0) {
                    showToast("Preço de venda inválido.", "error");
                    throw new Error("Invalid price");
                }

                const data = {
                    name: document.getElementById('p-name').value.trim(),
                    category: document.getElementById('p-cat').value,
                    stock: parseInt(document.getElementById('p-stock').value),
                    salePrice: price,
                    unitCost: unit,
                    image: document.getElementById('p-img').value.trim(),
                    date: id ? products.find(x => x.id === id).date : Date.now()
                };

                /**
                 * MANDATORY RULE 1: Strict Paths
                 */
                if (id) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), data);
                    showToast("Produto atualizado!");
                } else {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                    await addDoc(colRef, data);
                    showToast("Produto adicionado!");
                }
                closeProductModal();
            } catch (error) {
                if(error.message !== "Invalid price") {
                    showToast("Erro ao salvar produto.", "error");
                    console.error(error);
                }
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        window.confirmDeleteProduct = async () => {
            const id = document.getElementById('edit-id').value;
            if(!id || !currentUser) return;

            const btn = document.getElementById('btn-delete-product');
            if(!btn.dataset.confirming) {
                btn.dataset.confirming = 'true';
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<span class="text-xs">Excluir?</span>';
                setTimeout(() => {
                    btn.dataset.confirming = '';
                    btn.innerHTML = originalHtml;
                }, 3000);
                return;
            }

            try {
                btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-red-600"></div>`;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));
                showToast("Produto excluído.", "info");
                closeProductModal();
            } catch (error) {
                showToast("Erro ao excluir.", "error");
            }
        };

        window.vendaRapida = async (id) => {
            if (!currentUser) return;
            const p = products.find(x => x.id === id);
            if (!p || p.stock <= 0) {
                showToast("Sem estoque!", "error");
                return;
            }

            try {
                // Update Stock
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), {
                    stock: p.stock - 1
                });

                // Record Sale
                const sCol = collection(db, 'artifacts', appId, 'public', 'data', 'sales');
                await addDoc(sCol, {
                    pId: id,
                    pName: p.name,
                    amount: p.salePrice,
                    profit: p.salePrice - (p.unitCost || 0),
                    date: Date.now()
                });

                showToast(`Venda de ${p.name} registrada!`, "success");
            } catch (error) {
                showToast("Erro ao vender.", "error");
            }
        };

        window.exportData = () => {
            let csv = "Data,Produto,Valor(R$),Lucro(R$)\n";
            sales.forEach(s => {
                const data = new Date(s.date).toLocaleDateString('pt-BR');
                csv += `${data},"${s.pName}",${s.amount.toFixed(2)},${s.profit.toFixed(2)}\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `relatorio_vendas.csv`;
            a.click();
            showToast("Relatório exportado.", "info");
        };

        // Start Auth process
        initAuth();
    </script>
</body>
</html>
